<body>
<div id="app"></div>
<script>
"use strict";

/* ═══════════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════════ */
var LS = {
  get: function(k){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return null; } },
  set: function(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
};

/* ═══════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════ */
var THEMES = {
  emerald:{name:"Émeraude",p:"#10b981",l:"#d1fae5",d:"#065f46",b:"#6ee7b7",bg:"#f0fdf4"},
  violet :{name:"Violet",  p:"#7c3aed",l:"#ede9fe",d:"#3b0764",b:"#c4b5fd",bg:"#faf5ff"},
  amber  :{name:"Ambre",   p:"#d97706",l:"#fef3c7",d:"#78350f",b:"#fde68a",bg:"#fffbeb"},
  rose   :{name:"Rose",    p:"#e11d48",l:"#ffe4e6",d:"#881337",b:"#fecdd3",bg:"#fff1f2"},
  sky    :{name:"Ciel",    p:"#0284c7",l:"#e0f2fe",d:"#0c4a6e",b:"#bae6fd",bg:"#f0f9ff"}
};

var CATS = [
  {id:"culture", label:"Culture",    icon:"📚"},
  {id:"sport",   label:"Sport",      icon:"🏃"},
  {id:"creatif", label:"Créativité", icon:"🎨"},
  {id:"perso",   label:"Dev perso",  icon:"🧠"},
  {id:"cuisine", label:"Cuisine",    icon:"🍳"},
  {id:"cinema",  label:"Cinéma",     icon:"🎬"},
  {id:"langues", label:"Langues",    icon:"🗣️"},
  {id:"musique", label:"Musique",    icon:"🎵"},
  {id:"autre",   label:"Autre",      icon:"✨"}
];

var DIFFS = [
  {id:"easy",  label:"Facile",    xp:50,  color:"#10b981"},
  {id:"medium",label:"Moyen",     xp:120, color:"#f59e0b"},
  {id:"hard",  label:"Difficile", xp:250, color:"#ef4444"}
];

var EXPRESS = [
  {title:"20 min sans téléphone", desc:"Travaille sur une tâche repoussée.", cat:"perso",   xp:60},
  {title:"Lis 10 pages",          desc:"N'importe quel livre ou article.",   cat:"culture", xp:50},
  {title:"Étire-toi 10 min",      desc:"Corps débloqué = esprit débloqué.", cat:"sport",   xp:40},
  {title:"Écris 5 idées",         desc:"Peu importe le sujet.",             cat:"creatif", xp:55},
  {title:"Range un espace",       desc:"Bureau, chambre, sac.",             cat:"perso",   xp:45},
  {title:"Regarde un court",      desc:"Moins de 20 min de cinéma.",        cat:"cinema",  xp:50}
];

var catMap  = {};
CATS.forEach(function(c){ catMap[c.id]=c; });
var diffMap = {};
DIFFS.forEach(function(d){ diffMap[d.id]=d; });

function uid(){ return Math.random().toString(36).slice(2,10); }
function fmtDate(){ return new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"}); }
function lvlName(l){ return l<5?"Novice":l<10?"Aventurier":l<20?"Explorateur":l<50?"Héros":"Légende"; }
function xpFor(l){ return l*200; }

/* ═══════════════════════════════════════════════
   DEFAULT STATE  (clean slate — no demo data)
═══════════════════════════════════════════════ */
var DEFAULT_STATE = {
  themeKey:"emerald",
  quests:[],
  folders:[],
  log:[],
  xp:0, level:1, streak:0, xpToday:0, dailyGoal:200,
  guildName:"", guildChallenges:[],
  playerName:"", playerAvatar:"⚔️"
};

/* ═══════════════════════════════════════════════
   LOAD / BOOT STATE
═══════════════════════════════════════════════ */
var S = LS.get("sq_state");
if(!S){ S = JSON.parse(JSON.stringify(DEFAULT_STATE)); }
// Guard missing fields (for old saves)
if(!S.folders)         S.folders=[];
if(!S.log)             S.log=[];
if(!S.guildName)       S.guildName="";
if(!S.guildChallenges) S.guildChallenges=[];
if(!S.xpToday)         S.xpToday=0;
if(!S.dailyGoal)       S.dailyGoal=200;
if(!S.playerName)      S.playerName="";
if(!S.playerAvatar)    S.playerAvatar="⚔️";
if(!S.streak)          S.streak=0;

function save(){ LS.set("sq_state",S); }

/* ═══════════════════════════════════════════════
   DOM HELPERS
═══════════════════════════════════════════════ */
function el(tag, attrs, children){
  var e = document.createElement(tag);
  attrs = attrs || {};
  children = children || [];
  Object.keys(attrs).forEach(function(k){
    var v = attrs[k];
    if(k === "style" && typeof v === "object"){
      Object.keys(v).forEach(function(sk){ e.style[sk]=v[sk]; });
    } else if(k === "html"){
      e.innerHTML = v;
    } else {
      e.setAttribute(k, v);
    }
  });
  children.forEach(function(c){
    if(c==null || c===false || c===undefined) return;
    if(typeof c === "string" || typeof c === "number"){
      e.appendChild(document.createTextNode(String(c)));
    } else if(c instanceof Node){
      e.appendChild(c);
    }
  });
  return e;
}

function div(style, children){
  var e = document.createElement("div");
  if(style && typeof style === "object"){
    Object.keys(style).forEach(function(k){ e.style[k]=style[k]; });
  }
  (children||[]).forEach(function(c){
    if(c==null || c===false || c===undefined) return;
    if(typeof c === "string" || typeof c === "number"){
      e.appendChild(document.createTextNode(String(c)));
    } else if(c instanceof Node){
      e.appendChild(c);
    }
  });
  return e;
}

function btn(txt, style, cb){
  var e = document.createElement("button");
  if(style && typeof style === "object"){
    Object.keys(style).forEach(function(k){ e.style[k]=style[k]; });
  }
  e.appendChild(document.createTextNode(String(txt)));
  if(cb) e.addEventListener("click", cb);
  return e;
}

function mkInput(placeholder, value, style){
  var e = document.createElement("input");
  e.placeholder = placeholder||"";
  e.value = value||"";
  var base = {width:"100%",border:"1px solid #e5e7eb",borderRadius:"10px",padding:"10px 12px",fontSize:"14px",marginBottom:"10px",boxSizing:"border-box"};
  Object.keys(base).forEach(function(k){ e.style[k]=base[k]; });
  if(style) Object.keys(style).forEach(function(k){ e.style[k]=style[k]; });
  return e;
}

function mkSelect(options, value, style){
  var e = document.createElement("select");
  var base = {border:"1px solid #e5e7eb",borderRadius:"10px",padding:"10px 12px",fontSize:"14px"};
  Object.keys(base).forEach(function(k){ e.style[k]=base[k]; });
  if(style) Object.keys(style).forEach(function(k){ e.style[k]=style[k]; });
  options.forEach(function(opt){
    var o = document.createElement("option");
    o.value = opt[0];
    o.textContent = opt[1];
    if(opt[0]===value) o.selected=true;
    e.appendChild(o);
  });
  return e;
}

function pill(active, label, cb, T){
  var e = document.createElement("button");
  e.textContent = label;
  e.style.background  = active ? T.p : "#fff";
  e.style.color       = active ? "#fff" : "#6b7280";
  e.style.border      = "1px solid "+(active ? T.p : "#e5e7eb");
  e.style.borderRadius= "20px";
  e.style.padding     = "5px 12px";
  e.style.fontSize    = "12px";
  e.style.fontWeight  = active ? "600" : "400";
  e.style.cursor      = "pointer";
  e.style.whiteSpace  = "nowrap";
  if(cb) e.addEventListener("click", cb);
  return e;
}

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
function modal(contentNode){
  var overlay = div({position:"fixed",inset:"0",background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-end",zIndex:"200"});
  var box     = div({background:"#fff",borderRadius:"20px 20px 0 0",padding:"24px 20px",width:"100%",maxWidth:"400px",margin:"0 auto",maxHeight:"88vh",overflowY:"auto"});
  overlay.addEventListener("click", function(){ overlay.remove(); });
  box.addEventListener("click", function(e){ e.stopPropagation(); });
  box.appendChild(contentNode);
  overlay.appendChild(box);
  document.getElementById("app").appendChild(overlay);
  return overlay;
}

/* ═══════════════════════════════════════════════
   XP ARC  (SVG half-circle gauge)
═══════════════════════════════════════════════ */
function xpArc(xpToday, goal, T){
  var pct  = Math.min(100, Math.round((xpToday/goal)*100));
  var r=54, cx=70, cy=70;
  var circ = Math.PI*r;
  var dash = circ*(pct/100);
  var ns   = "http://www.w3.org/2000/svg";

  function svgPath(stroke, dashArr){
    var p = document.createElementNS(ns,"path");
    p.setAttribute("d","M "+(cx-r)+" "+cy+" A "+r+" "+r+" 0 0 1 "+(cx+r)+" "+cy);
    p.setAttribute("fill","none");
    p.setAttribute("stroke",stroke);
    p.setAttribute("stroke-width","12");
    p.setAttribute("stroke-linecap","round");
    if(dashArr) p.setAttribute("stroke-dasharray",dashArr);
    return p;
  }
  function svgText(x,y,size,weight,fill,text){
    var t = document.createElementNS(ns,"text");
    t.setAttribute("x",x); t.setAttribute("y",y);
    t.setAttribute("text-anchor","middle");
    t.setAttribute("font-size",size);
    t.setAttribute("font-weight",weight);
    t.setAttribute("fill",fill);
    t.textContent = text;
    return t;
  }

  var svg = document.createElementNS(ns,"svg");
  svg.setAttribute("width","140"); svg.setAttribute("height","80"); svg.setAttribute("viewBox","0 0 140 80");
  svg.appendChild(svgPath("#e5e7eb", null));
  svg.appendChild(svgPath(T.p, dash+" "+circ));
  svg.appendChild(svgText(cx, cy-8, "18","700", T.d, String(xpToday)));
  svg.appendChild(svgText(cx, cy+8, "11","400","#9ca3af","/ "+goal+" XP"));
  return svg;
}

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
var currentTab = "home";
var qFilter = {groupBy:"statut", cat:"all", diff:"all", sort:"default"};

/* ═══════════════════════════════════════════════
   ADD XP  (handles level-up)
═══════════════════════════════════════════════ */
function addXp(amount){
  S.xp      += amount;
  S.xpToday += amount;
  var needed = xpFor(S.level);
  if(S.xp >= needed){
    S.xp -= needed;
    S.level++;
    save();
    showToast("✨ Niveau "+S.level+" atteint !");
  } else {
    save();
  }
}

function showToast(msg){
  var T = THEMES[S.themeKey];
  var t = div({position:"fixed",top:"16px",left:"50%",transform:"translateX(-50%)",background:T.p,color:"#fff",padding:"12px 28px",borderRadius:"99px",fontWeight:"700",fontSize:"15px",zIndex:"300",boxShadow:"0 4px 20px rgba(0,0,0,0.15)",whiteSpace:"nowrap"},[msg]);
  document.getElementById("app").appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 2500);
}

/* ═══════════════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════════════ */
function render(){
  var T       = THEMES[S.themeKey];
  var app     = document.getElementById("app");
  var xpNeeded= xpFor(S.level);
  var xpPct   = Math.min(100, Math.round((S.xp/xpNeeded)*100));

  // Remove everything except modals and toasts (z-index >= 200)
  var keep = [];
  for(var i=0;i<app.childNodes.length;i++){
    var c = app.childNodes[i];
    if(c.nodeType===1){
      var z = parseInt(c.style.zIndex||"0",10);
      if(z>=200) keep.push(c);
    }
  }
  app.innerHTML = "";
  keep.forEach(function(c){ app.appendChild(c); });

  // ── HEADER ──
  var hdr = div({background:"#fff",borderBottom:"1.5px solid "+T.b,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"},[
    div({},[
      el("div",{style:{fontWeight:"700",fontSize:"20px",color:T.d,letterSpacing:"-0.5px"}},["SideQuest"]),
      el("div",{style:{fontSize:"11px",color:"#9ca3af"}},["Ton aventure commence ici"])
    ]),
    div({display:"flex",alignItems:"center",gap:"8px"},[
      btn("🎨",{background:T.l,border:"1px solid "+T.b,borderRadius:"20px",padding:"4px 10px",fontSize:"11px",fontWeight:"600",color:T.d}, function(){ openThemes(); }),
      div({textAlign:"right"},[
        el("div",{style:{fontWeight:"600",fontSize:"13px",color:T.d}},["Niv. "+S.level+" · "+lvlName(S.level)]),
        el("div",{style:{fontSize:"11px",color:"#9ca3af"}},[S.xp+"/"+xpNeeded+" XP"])
      ])
    ])
  ]);

  // ── XP BAR ──
  var xpBar = div({background:"#e5e7eb",height:"5px"},[
    div({background:T.p,width:xpPct+"%",height:"5px",transition:"width 0.5s"})
  ]);

  // ── CONTENT ──
  var content;
  if     (currentTab==="home")    content = renderHome(T);
  else if(currentTab==="quests")  content = renderQuests(T);
  else if(currentTab==="folders") content = renderFolders(T);
  else if(currentTab==="guild")   content = renderGuild(T);
  else if(currentTab==="journal") content = renderJournal(T);
  else if(currentTab==="profil")  content = renderProfil(T);
  else                            content = renderHome(T);

  var wrap = div({padding:"16px 16px 80px",overflowY:"auto",maxHeight:"calc(100vh - 74px)"});
  wrap.appendChild(content);

  // ── CONTAINER ──
  var container = div({maxWidth:"400px",margin:"0 auto",minHeight:"100vh",background:T.bg});
  container.appendChild(hdr);
  container.appendChild(xpBar);
  container.appendChild(wrap);

  // ── NAV ──
  var navItems = [
    {id:"home",   icon:"🏠",label:"Accueil"},
    {id:"quests", icon:"⚔️",label:"Quêtes"},
    {id:"folders",icon:"📁",label:"Dossiers"},
    {id:"guild",  icon:"🏰",label:"Guilde"},
    {id:"journal",icon:"📖",label:"Journal"},
    {id:"profil", icon:"👤",label:"Profil"}
  ];
  var nav = div({position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"400px",background:"#fff",borderTop:"1px solid #e5e7eb",display:"grid",gridTemplateColumns:"repeat(6,1fr)",padding:"6px 0 8px",zIndex:"100"});
  navItems.forEach(function(n){
    var active = (currentTab===n.id);
    var dot    = active ? div({width:"3px",height:"3px",borderRadius:"50%",background:T.p,marginTop:"1px"}) : null;
    var item   = div({display:"flex",flexDirection:"column",alignItems:"center",gap:"1px",padding:"3px 0",cursor:"pointer"},[
      el("span",{style:{fontSize:"17px"}},[n.icon]),
      el("span",{style:{fontSize:"9px",fontWeight:active?"700":"400",color:active?T.d:"#9ca3af"}},[n.label]),
      dot
    ]);
    (function(id){ item.addEventListener("click",function(){ currentTab=id; render(); }); })(n.id);
    nav.appendChild(item);
  });

  app.insertBefore(container, app.firstChild);
  app.appendChild(nav);
}

/* ═══════════════════════════════════════════════
   HOME
═══════════════════════════════════════════════ */
function renderHome(T){
  var dailyPct = Math.min(100,Math.round((S.xpToday/S.dailyGoal)*100));
  var active   = S.quests.filter(function(q){ return q.status==="active"; });

  var statsItems = [
    {label:"XP total",  val: S.xp + S.level*xpFor(S.level)},
    {label:"Quêtes",    val: S.quests.filter(function(q){ return q.status==="done"; }).length},
    {label:"Streak",    val: S.streak+"j"}
  ];
  var statsRow = div({display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px",marginBottom:"14px"});
  statsItems.forEach(function(s){
    statsRow.appendChild(div({background:"#fff",border:"1px solid "+T.b,borderRadius:"12px",padding:"12px 10px",textAlign:"center"},[
      el("div",{style:{fontSize:"18px",fontWeight:"700",color:T.d}},[String(s.val)]),
      el("div",{style:{fontSize:"11px",color:"#9ca3af",marginTop:"2px"}},[s.label])
    ]));
  });

  var arcWrap = div({background:"#fff",border:"1.5px solid "+T.b,borderRadius:"14px",padding:"16px",marginBottom:"14px",display:"flex",alignItems:"center",gap:"16px"});
  arcWrap.appendChild(xpArc(S.xpToday, S.dailyGoal, T));
  var arcText = div({},[
    el("div",{style:{fontWeight:"700",fontSize:"14px",color:T.d,marginBottom:"4px"}},["Objectif du jour"]),
    el("div",{style:{fontSize:"12px",color:"#6b7280",lineHeight:"1.5"}},["Atteins ton objectif quotidien."])
  ]);
  if(dailyPct>=100) arcText.appendChild(el("div",{style:{marginTop:"6px",fontSize:"13px",fontWeight:"600",color:T.p}},["🎉 Objectif atteint !"]));
  arcWrap.appendChild(arcText);

  var expressBox = div({background:T.l,border:"1.5px solid "+T.b,borderRadius:"14px",padding:"14px",marginBottom:"14px"},[
    el("div",{style:{fontWeight:"700",fontSize:"14px",color:T.d,marginBottom:"3px"}},["⚡ Quête Express"]),
    el("div",{style:{fontSize:"12px",color:T.d,opacity:"0.7",marginBottom:"10px"}},["Anti-procrastination — 15 min max"]),
    btn("Lancer →",{background:T.p,color:"#fff",border:"none",borderRadius:"10px",padding:"9px",fontWeight:"600",fontSize:"13px",width:"100%"}, function(){ openExpress(T); })
  ]);

  var wrapper = div({});
  wrapper.appendChild(statsRow);
  wrapper.appendChild(arcWrap);
  wrapper.appendChild(expressBox);

  var sectionTitle = el("div",{style:{fontWeight:"600",fontSize:"14px",color:"#111827",marginBottom:"10px"}},["En cours"]);
  wrapper.appendChild(sectionTitle);

  if(active.length===0){
    wrapper.appendChild(el("div",{style:{textAlign:"center",color:"#6b7280",fontSize:"13px",padding:"20px 0"}},["Aucune quête active. Lance-toi !"]));
  } else {
    active.slice(0,3).forEach(function(q){
      wrapper.appendChild(questCard(q, T, true));
    });
  }
  return wrapper;
}

/* ═══════════════════════════════════════════════
   QUEST CARD
═══════════════════════════════════════════════ */
function questCard(q, T, slim){
  var cat    = catMap[q.cat]  || {icon:"✨",label:"Autre"};
  var diff   = diffMap[q.diff]|| DIFFS[0];
  var isDone    = q.status==="done";
  var isWaiting = q.status==="waiting";

  // Tags row
  var tags = div({display:"flex",gap:"4px",flexWrap:"wrap",justifyContent:"flex-end",flexShrink:"0"});
  if(isWaiting) tags.appendChild(el("span",{style:{background:"#f3f4f6",borderRadius:"8px",padding:"3px 7px",fontSize:"11px",color:"#6b7280",fontWeight:"600"}},["⏳"]));
  tags.appendChild(el("span",{style:{fontSize:"11px",fontWeight:"600",color:diff.color,background:diff.color+"18",borderRadius:"8px",padding:"3px 7px"}},[diff.label]));
  tags.appendChild(el("span",{style:{fontSize:"11px",fontWeight:"600",color:T.d,background:T.l,borderRadius:"8px",padding:"3px 7px"}},[q.xp+" XP"]));

  var titleText = el("div",{style:{fontWeight:"600",fontSize:"14px",color:isDone?"#6b7280":"#111827",textDecoration:isDone?"line-through":"none"}},[cat.icon+" "+q.title]);
  var titleCol  = div({flex:"1",paddingRight:"8px"},[titleText]);
  if(q.desc) titleCol.appendChild(el("div",{style:{fontSize:"12px",color:"#6b7280",marginTop:"2px"}},[q.desc]));

  var titleRow = div({display:"flex",justifyContent:"space-between",alignItems:"flex-start"},[titleCol, tags]);

  var card = div({background:isDone?"#f9fafb":"#fff",border:"1px solid "+(isDone?"#e5e7eb":T.b),borderRadius:"14px",padding:"14px",marginBottom:"10px",opacity:isDone?"0.8":"1"});
  card.appendChild(titleRow);

  // ── Goal progress ──
  if(q.goalTarget && q.goalTarget>0 && !isDone){
    var prog = q.goalProgress||0;
    var pct  = Math.min(100, Math.round((prog/q.goalTarget)*100));
    var goalWrap = div({marginTop:"10px",background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:"10px",padding:"10px"});
    goalWrap.appendChild(div({display:"flex",justifyContent:"space-between",marginBottom:"4px"},[
      el("span",{style:{fontSize:"12px",fontWeight:"600",color:"#374151"}},[prog+" / "+q.goalTarget+" "+q.goalUnit]),
      el("span",{style:{fontSize:"12px",fontWeight:"700",color:pct>=100?T.p:"#6b7280"}},[pct+"% "+(pct>=100?"✓":"")])
    ]));
    goalWrap.appendChild(div({background:"#e5e7eb",borderRadius:"4px",height:"6px",marginBottom:"8px"}),[
      div({background:T.p,width:pct+"%",height:"6px",borderRadius:"4px",transition:"width 0.3s"})
    ]);
    var addInp = el("input",{type:"number",min:"0",placeholder:"+ "+q.goalUnit,style:{flex:"1",border:"1px solid #e5e7eb",borderRadius:"8px",padding:"6px 10px",fontSize:"13px"}});
    var addBtn = btn("+",{background:T.p,color:"#fff",border:"none",borderRadius:"8px",padding:"6px 12px",fontWeight:"600",minWidth:"36px"}, function(){
      var val = parseFloat(addInp.value);
      if(!val || val<=0) return;
      q.goalProgress = Math.min(q.goalTarget, (q.goalProgress||0)+val);
      addInp.value="";
      save(); render();
    });
    var addRow = div({display:"flex",gap:"6px"});
    addRow.appendChild(addInp);
    addRow.appendChild(addBtn);
    goalWrap.appendChild(addRow);
    card.appendChild(goalWrap);
  }

  // ── Sub-objectives ──
  if(!isDone && q.subs && q.subs.length>0){
    var progress = Math.round((q.subsChecked.filter(Boolean).length/q.subs.length)*100);
    var subsWrap = div({marginTop:"8px"});
    subsWrap.appendChild(div({background:"#e5e7eb",borderRadius:"4px",height:"4px",marginBottom:"6px"}),[
      div({background:T.p,width:progress+"%",height:"4px",borderRadius:"4px"})
    ]);
    q.subs.forEach(function(s,i){
      var chk = div({width:"15px",height:"15px",borderRadius:"4px",border:"2px solid "+(q.subsChecked[i]?T.p:"#d1d5db"),background:q.subsChecked[i]?T.p:"#fff",flexShrink:"0",display:"flex",alignItems:"center",justifyContent:"center"});
      if(q.subsChecked[i]) chk.appendChild(el("span",{style:{color:"#fff",fontSize:"9px"}},["✓"]));
      var row = div({display:"flex",alignItems:"center",gap:"8px",padding:"3px 0",cursor:"pointer"},[
        chk,
        el("span",{style:{fontSize:"13px",color:q.subsChecked[i]?"#9ca3af":"#374151",textDecoration:q.subsChecked[i]?"line-through":"none"}},[s])
      ]);
      (function(idx){
        row.addEventListener("click",function(){
          q.subsChecked[idx]=!q.subsChecked[idx];
          save(); render();
        });
      })(i);
      subsWrap.appendChild(row);
    });
    card.appendChild(subsWrap);
  }

  // ── Action buttons ──
  var btnsRow = div({display:"flex",gap:"8px",marginTop:"12px",flexWrap:"wrap"});
  if(!isDone && q.status==="active"){
    btnsRow.appendChild(btn("✓ Terminer",{background:T.l,color:T.d,border:"1px solid "+T.b,borderRadius:"8px",padding:"6px 14px",fontSize:"13px",fontWeight:"600"}, function(){ completeQuest(q.id); }));
  }
  if(!isDone && q.status==="waiting"){
    btnsRow.appendChild(btn("▶ Démarrer",{background:T.p,color:"#fff",border:"none",borderRadius:"8px",padding:"6px 14px",fontSize:"13px",fontWeight:"600"}, function(){ q.status="active"; save(); render(); }));
  }
  if(isDone){
    btnsRow.appendChild(btn("↩ Annuler",{background:"#fef3c7",color:"#92400e",border:"1px solid #fde68a",borderRadius:"8px",padding:"6px 12px",fontSize:"12px"}, function(){ undoneQuest(q.id); }));
  }
  if(!slim){
    btnsRow.appendChild(btn("✏️",{background:"#f3f4f6",color:"#374151",border:"1px solid #e5e7eb",borderRadius:"8px",padding:"6px 12px",fontSize:"13px"}, function(){ openEditQuest(q); }));
    btnsRow.appendChild(btn("🗑️",{background:"#fee2e2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:"8px",padding:"6px 12px",fontSize:"13px"}, function(){
      S.quests = S.quests.filter(function(x){ return x.id!==q.id; });
      save(); render();
    }));
  }
  if(btnsRow.children.length>0) card.appendChild(btnsRow);

  return card;
}

function completeQuest(id){
  var q = S.quests.find(function(x){ return x.id===id; });
  if(!q || q.status==="done") return;
  q.status = "done";
  addXp(q.xp);
  S.log.unshift({date:fmtDate(), text:"Tu as terminé '"+q.title+"'. +"+q.xp+" XP."});
  save(); render();
}

function undoneQuest(id){
  var q = S.quests.find(function(x){ return x.id===id; });
  if(!q || q.status!=="done") return;
  q.status = "active";
  S.xp      = Math.max(0, S.xp-q.xp);
  S.xpToday = Math.max(0, S.xpToday-q.xp);
  S.log.unshift({date:fmtDate(), text:"Quête '"+q.title+"' remise en cours."});
  save(); render();
}

function renderQuests(T){
  var list = S.quests.slice();
  if(qFilter.cat!=="all")  list = list.filter(function(q){ return q.cat===qFilter.cat; });
  if(qFilter.diff!=="all") list = list.filter(function(q){ return q.diff===qFilter.diff; });
  if(qFilter.sort==="xp_desc")  list.sort(function(a,b){ return b.xp-a.xp; });
  if(qFilter.sort==="xp_asc")   list.sort(function(a,b){ return a.xp-b.xp; });
  if(qFilter.sort==="sub_desc") list.sort(function(a,b){ return b.subs.length-a.subs.length; });
  if(qFilter.sort==="sub_asc")  list.sort(function(a,b){ return a.subs.length-b.subs.length; });

  var groups = [];
  if(qFilter.groupBy==="statut"){
    groups = [
      {key:"active",  label:"En cours",   items:list.filter(function(q){ return q.status==="active"; })},
      {key:"waiting", label:"En attente", items:list.filter(function(q){ return q.status==="waiting"; })},
      {key:"done",    label:"Terminées",  items:list.filter(function(q){ return q.status==="done"; })}
    ];
  } else if(qFilter.groupBy==="catégorie"){
    groups = CATS.map(function(c){ return {key:c.id,label:c.icon+" "+c.label,items:list.filter(function(q){ return q.cat===c.id; })}; }).filter(function(g){ return g.items.length>0; });
  } else if(qFilter.groupBy==="difficulté"){
    groups = DIFFS.map(function(d){ return {key:d.id,label:d.label,color:d.color,items:list.filter(function(q){ return q.diff===d.id; })}; }).filter(function(g){ return g.items.length>0; });
  } else if(qFilter.groupBy==="dossier"){
    groups = S.folders.map(function(f){ return {key:f.id,label:f.icon+" "+f.title,items:list.filter(function(q){ return q.folderId===f.id; })}; });
    groups.push({key:"none",label:"📌 Sans dossier",items:list.filter(function(q){ return !q.folderId; })});
    groups = groups.filter(function(g){ return g.items.length>0; });
  }

  var wrapper = div({});

  // Header
  var header = div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"});
  header.appendChild(el("div",{style:{fontWeight:"600",fontSize:"16px",color:"#111827"}},["Mes Quêtes"]));
  var hBtns = div({display:"flex",gap:"6px"});
  hBtns.appendChild(btn("📁",{background:T.l,color:T.d,border:"1px solid "+T.b,borderRadius:"10px",padding:"7px 10px",fontSize:"13px"}, function(){ openFolderCreate(T); }));
  hBtns.appendChild(btn("+ Créer",{background:T.p,color:"#fff",border:"none",borderRadius:"10px",padding:"7px 14px",fontSize:"13px",fontWeight:"600"}, function(){ openCreateQuest(T); }));
  header.appendChild(hBtns);
  wrapper.appendChild(header);

  // Filter rows
  function filterRow(label, pills){
    var row = div({marginBottom:"8px"});
    row.appendChild(el("div",{style:{fontSize:"11px",fontWeight:"600",color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:"5px"}},[label]));
    var pillsWrap = div({display:"flex",gap:"6px",overflowX:"auto",paddingBottom:"2px",flexWrap:"wrap"});
    pills.forEach(function(p){ pillsWrap.appendChild(p); });
    row.appendChild(pillsWrap);
    return row;
  }

  var groupPills = [["statut","Statut"],["catégorie","Catégorie"],["difficulté","Difficulté"],["dossier","Dossier"]].map(function(vl){
    return pill(qFilter.groupBy===vl[0], vl[1], function(){ qFilter.groupBy=vl[0]; render(); }, T);
  });
  var catPills = [pill(qFilter.cat==="all","Tous",function(){ qFilter.cat="all"; render(); },T)].concat(
    CATS.map(function(c){ return pill(qFilter.cat===c.id, c.icon+" "+c.label, function(){ qFilter.cat=(qFilter.cat===c.id?"all":c.id); render(); }, T); })
  );
  var diffPills = [pill(qFilter.diff==="all","Toutes",function(){ qFilter.diff="all"; render(); },T)].concat(
    DIFFS.map(function(d){ return pill(qFilter.diff===d.id, d.label, function(){ qFilter.diff=(qFilter.diff===d.id?"all":d.id); render(); }, T); })
  );
  var sortPills = [["default","Défaut"],["xp_desc","XP ↓"],["xp_asc","XP ↑"],["sub_desc","Long ↓"],["sub_asc","Court ↑"]].map(function(vl){
    return pill(qFilter.sort===vl[0], vl[1], function(){ qFilter.sort=vl[0]; render(); }, T);
  });

  wrapper.appendChild(filterRow("Grouper",   groupPills));
  wrapper.appendChild(filterRow("Catégorie", catPills));
  wrapper.appendChild(filterRow("Difficulté",diffPills));
  wrapper.appendChild(filterRow("Trier",     sortPills));
  wrapper.appendChild(div({marginBottom:"12px"}));

  if(list.length===0){
    wrapper.appendChild(el("div",{style:{textAlign:"center",color:"#6b7280",fontSize:"14px",padding:"40px 0"}},["Aucune quête ne correspond."]));
  }

  groups.forEach(function(g){
    var sep = div({display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"},[
      div({height:"1px",flex:"1",background:"#e5e7eb"}),
      el("span",{style:{fontSize:"12px",fontWeight:"700",color:g.color||T.d,textTransform:"uppercase",letterSpacing:"0.8px",whiteSpace:"nowrap"}},[g.label+" ("+g.items.length+")"]),
      div({height:"1px",flex:"1",background:"#e5e7eb"})
    ]);
    wrapper.appendChild(sep);
    if(g.items.length===0){
      wrapper.appendChild(el("div",{style:{fontSize:"13px",color:"#9ca3af",textAlign:"center",padding:"6px 0"}},["Aucune quête"]));
    } else {
      g.items.forEach(function(q){ wrapper.appendChild(questCard(q,T,false)); });
    }
  });

  return wrapper;
}

var openFolderIds = {};

  var wrapper = div({});

    wrapper.appendChild(el("div",{style:{textAlign:"center",color:"#6b7280",fontSize:"14px",padding:"40px 0"}},["Aucun dossier. Crées-en un !"]));

  S.folders.forEach(function(f){
    var fq   = S.quests.filter(function(q){ return q.folderId===f.id; });
    var done = fq.filter(function(q){ return q.status==="done"; }).length;

    if(f.desc) sumInfo.appendChild(el("div",{style:{fontSize:"12px",color:"#6b7280",marginTop:"1px"}},[f.desc]));
    sumInfo.appendChild(el("div",{style:{fontSize:"12px",color:T.d,marginTop:"4px"}},[done+"/"+fq.length+" quêtes · "+pct+"%"]));
    sumRow.appendChild(sumInfo);
    sumRow.appendChild(el("span",{style:{fontSize:"18px",color:"#9ca3af"}},[isOpen?"▲":"▼"]));
    summary.appendChild(sumRow);
    summary.appendChild(div({background:"#e5e7eb",borderRadius:"4px",height:"6px",marginTop:"10px"}),[
      div({background:T.p,width:pct+"%",height:"6px",borderRadius:"4px"})
    ]);
    (function(fid){
      summary.addEventListener("click",function(){ openFolderIds[fid]=!openFolderIds[fid]; render(); });
    })(f.id);
    card.appendChild(summary);

    if(isOpen){
      var inner = div({borderTop:"1px solid #f3f4f6",padding:"12px 16px"});
      if(fq.length===0){
        inner.appendChild(el("div",{style:{fontSize:"13px",color:"#9ca3af",textAlign:"center",padding:"8px 0"}},["Aucune quête dans ce dossier."]));
      } else {
        fq.forEach(function(q){ inner.appendChild(questCard(q,T,true)); });
      }
      var ibtns = div({display:"flex",gap:"8px",marginTop:"8px"});
      ibtns.appendChild(btn("✏️ Modifier",{background:"#f3f4f6",color:"#374151",border:"1px solid #e5e7eb",borderRadius:"8px",padding:"6px 12px",fontSize:"13px"}, function(){ openEditFolder(T,f); }));
      ibtns.appendChild(btn("🗑️ Supprimer",{background:"#fee2e2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:"8px",padding:"6px 12px",fontSize:"13px"}, function(){
        S.folders = S.folders.filter(function(x){ return x.id!==f.id; });
        delete openFolderIds[f.id];
        save(); render();
      }));
      inner.appendChild(ibtns);
      card.appendChild(inner);
    }

    wrapper.appendChild(card);
  });
  return wrapper;
}

function openCreateQuest(T){
  questForm(null, T, function(f){
    var diff = DIFFS.find(function(d){ return d.id===f.diff; })||DIFFS[0];
    var subs = f.subs.split(",").map(function(s){ return s.trim(); }).filter(Boolean);
    S.quests.unshift({
      id:uid(), title:f.title, desc:f.desc, cat:f.cat, diff:f.diff,
      xp:diff.xp, status:f.status, subs:subs, subsChecked:subs.map(function(){ return false; }),
      folderId:f.folderId, goalTarget:f.goalTarget, goalUnit:f.goalUnit, goalProgress:0
    });
    save(); render();
  });
}

function openEditQuest(q){
  var T = THEMES[S.themeKey];
  questForm(q, T, function(f){
    var diff = DIFFS.find(function(d){ return d.id===f.diff; })||DIFFS[0];
    var subs = f.subs.split(",").map(function(s){ return s.trim(); }).filter(Boolean);
    var prevSubs = q.subs||[];
    q.title      = f.title;
    q.desc       = f.desc;
    q.cat        = f.cat;
    q.diff       = f.diff;
    q.xp         = diff.xp;
    q.status     = f.status;
    q.subs       = subs;
    q.subsChecked= subs.map(function(_,i){ return !!prevSubs[i]&&!!q.subsChecked[i]; });
    q.folderId   = f.folderId;
    q.goalTarget = f.goalTarget;
    q.goalUnit   = f.goalUnit;
    if(q.goalProgress===undefined) q.goalProgress=0;
    save(); render();
  });
}

    avGrid.appendChild(b);
  });
  overlay.appendChild(avGrid);

  overlay.appendChild(btn("Commencer l'aventure →",{width:"100%",background:T.p,color:"#fff",border:"none",borderRadius:"14px",padding:"14px",fontWeight:"700",fontSize:"16px"}, function(){
    var name = nameInp.value.trim();
    if(!name){ nameInp.style.border="2px solid #ef4444"; nameInp.focus(); return; }
    S.playerName   = name;
    S.playerAvatar = chosen;
    save();
    if(overlay.parentNode) overlay.parentNode.removeChild(overlay);
    onDone();
  }));

  var app = document.getElementById("app");
  // Place full-width wrapper
  var wrapper = div({position:"fixed",inset:"0",display:"flex",justifyContent:"center",background:T.bg,zIndex:"500"});
  wrapper.appendChild(overlay);
  app.appendChild(wrapper);
}

/* ═══════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════ */
if(!S.playerName){
  showOnboarding(function(){ render(); });
} else {
  render();
}
</script>
</body>
</html>
